server:
  port: 8081

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 40036119098-o9agdelmnon6dek2n0ijgs2k5lc6n3mk.apps.googleusercontent.com
            client-secret: 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
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            scope: openid, profile, email

app:
  jwt:
    secret: my-super-secret-key-that-is-at-least-32-characters-long
    expiration-ms: 86400000

  cors:
    allowed-origins: http://localhost:3000

  oauth2:
    authorized-redirect-uris: http://localhost:3000/oauth2/redirect

logging:
  level:
    org.springframework.security: DEBUG
